upstream frontend {
    server 127.0.0.1:3000;
}

upstream backend {
    server 127.0.0.1:5000;
}

upstream minio_storage {
    server 127.0.0.1:9000;
}

upstream minio_console {
    server 127.0.0.1:9001;
}

server {
    listen 80;
    server_name streamsphere.arunai.pro;

    client_max_body_size 2G;

    proxy_connect_timeout 600;
    proxy_send_timeout    600;
    proxy_read_timeout    600;
    send_timeout          600;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Backend API
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # MinIO Storage
    location /storage/ {
        rewrite ^/storage/(.*) /$1 break;
        proxy_pass http://minio_storage;
        proxy_http_version 1.1;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range, Content-Type";
    }

    location /streamsphere/ {
        proxy_pass http://minio_storage;
        proxy_http_version 1.1;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Allow-Headers "Range, Content-Type";
    }

    # ──────────────────────────────────────
    # MinIO Console — fixed config
    # ──────────────────────────────────────
    location /minio-console/ {
        rewrite ^/minio-console/(.*) /$1 break;
        proxy_pass http://minio_console;
        proxy_http_version 1.1;

        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-NginX-Proxy     true;

        # WebSocket support (MinIO console uses it)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Required: tell MinIO console its sub-path prefix
        proxy_set_header X-Forwarded-Prefix /minio-console;

        real_ip_header X-Real-IP;
    }

    # Live HLS segments (served by backend Express static)
    location /live/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control no-cache;
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
    }

    # Frontend
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/vnd.apple.mpegurl
               video/mp2t;
}