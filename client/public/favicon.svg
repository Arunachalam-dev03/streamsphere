<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pulseBrand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4060;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC0022;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Clean squircle background -->
  <rect width="100" height="100" rx="24" fill="url(#pulseBrand)" />
  
  <!-- Waveform / Pulse that forms a play button -->
  <g filter="url(#softShadow)" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Center Play Triangle (made of distinct rhythmic lines) -->
    <path d="M 38 28 L 38 72" stroke-width="10" />
    <path d="M 54 36 L 54 64" stroke-width="10" />
    <path d="M 70 46 L 70 54" stroke-width="10" />
  </g>
</svg>
